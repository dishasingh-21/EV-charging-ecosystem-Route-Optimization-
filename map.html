<!DOCTYPE html>
<html>
    <head>
        <title>EV Route Map</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <style>
            .station-label {
                background: white;
                border: 1px solid black;
                padding: 2px 5px;
                font-size: 12px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h3 style="text-align: center;"> EV Route Map</h3>
        <div id="map" style="height: 600px;"></div>
        <div id="infobox" style="position: absolute; height: 50px; width: 200px; top: 70px; right: 50px; background: rgb(251, 251, 251); padding: 15px; border-radius: 10px; box-shadow:0 0 10px rgba(0,0,0,0.3); font-size:20px; z-index: 9999; font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif ;">
            <b>Route Info</b>
            <br>
            DISTANCE: <span id="distance">--</span> km 
        </div>
        <script src="CoordinateData/data.js"></script>
        <script src="script.js"></script>
    </body>
</html>
